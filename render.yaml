services:
  - type: web
    name: coffee-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # You'll paste this manually in Render dashboard
    autoDeploy: true       # Auto redeploy on every git push
